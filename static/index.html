<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BuyerShowTool - 买家秀生成工具</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container">
        <header>
            <div class="header-icon">🛒</div>
            <h1>BuyerShowTool</h1>
            <p class="subtitle">自动化好评文案与买家秀图片生成</p>
        </header>
        
        <main>
            <!-- 配置区域 -->
            <section class="config-section">
                <h2><span class="icon">⚙️</span> API 配置</h2>
                
                <!-- 配置提示 -->
                <div id="configAlert" class="config-alert" style="display: none;">
                    <span class="alert-icon">⚠️</span>
                    <span id="configAlertText">请先配置 API 密钥</span>
                </div>
                
                <!-- DeepSeek 配置 -->
                <div class="api-config">
                    <h3>DeepSeek API <span class="badge">文案</span></h3>
                    <div class="form-group">
                        <label for="deepseekUrl">API 地址</label>
                        <input type="text" id="deepseekUrl" placeholder="https://api.deepseek.com/v1/chat/completions">
                    </div>
                    <div class="form-group">
                        <label for="deepseekKey">API 密钥</label>
                        <input type="password" id="deepseekKey" placeholder="请输入 DeepSeek API 密钥">
                    </div>
                    <div class="form-group">
                        <label for="deepseekModel">模型</label>
                        <input type="text" id="deepseekModel" placeholder="deepseek-chat">
                    </div>
                    <div class="form-group">
                        <label for="deepseekCount">数量</label>
                        <input type="number" id="deepseekCount" value="4" min="1" max="10">
                    </div>
                </div>
                
                <!-- 通义配置 -->
                <div class="api-config">
                    <h3>通义万相 API <span class="badge">图片</span></h3>
                    <div class="form-group">
                        <label for="tongyiKey">API 密钥</label>
                        <input type="password" id="tongyiKey" placeholder="请输入通义万相 API 密钥">
                    </div>
                    <div class="form-group">
                        <label for="tongyiModel">模型</label>
                        <input type="text" id="tongyiModel" placeholder="wan2.7-image">
                    </div>
                    <div class="form-group">
                        <label for="tongyiCount">数量</label>
                        <input type="number" id="tongyiCount" value="4" min="1" max="10">
                    </div>
                </div>
                
                <div class="config-actions">
                    <button id="saveConfigBtn" class="btn-secondary">💾 保存配置</button>
                    <button id="resetConfigBtn" class="btn-outline">🔄 重置</button>
                </div>
            </section>
            
            <!-- 任务区域 -->
            <section class="task-section">
                <h2><span class="icon">📁</span> 运行任务</h2>
                <div class="form-group">
                    <label for="targetDir">目标目录</label>
                    <input type="text" id="targetDir" placeholder="请输入商品配置目录路径">
                    <button id="browseBtn" type="button">浏览...</button>
                </div>
                <div class="task-info">
                    <div class="task-info-item">
                        <span class="label">好评文案</span>
                        <span class="value" id="reviewCount">-</span>
                    </div>
                    <div class="task-info-item">
                        <span class="label">买家秀图片</span>
                        <span class="value" id="imageCount">-</span>
                    </div>
                </div>
            </section>
            
            <!-- 操作区域 -->
            <section class="action-section">
                <button id="runBtn" class="btn-primary" disabled>
                    🚀 开始生成
                </button>
                <button id="stopBtn" class="btn-danger" disabled>
                    ⏹️ 停止
                </button>
            </section>
            
            <!-- 日志区域 -->
            <section class="log-section">
                <div class="log-header">
                    <h2><span class="icon">📋</span> 运行日志</h2>
                    <button id="clearLogBtn" type="button">清空</button>
                </div>
                <div id="logContainer" class="log-container">
                    <div class="log-placeholder">点击"开始生成"后，日志将显示在这里...</div>
                </div>
            </section>
        </main>
        
        <footer>
            <p>BuyerShowTool v1.0 | 基于 DeepSeek & 通义万相 API</p>
        </footer>
    </div>
    
    <script src="js/app.js"></script>
</body>
</html>
